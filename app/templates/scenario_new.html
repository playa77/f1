{% extends "base.html" %}
{% block title %}New Scenario{% endblock %}

{% block content %}
<div class="scenario-new">
    <h1>Create New Scenario</h1>

    <form method="post" action="/scenarios/create" class="scenario-form">
        <div class="form-group">
            <label for="name">Scenario Name</label>
            <input type="text" id="name" name="name" required placeholder="e.g., Monza reliability crisis" />
        </div>
        <div class="form-group">
            <label for="goal">Scenario Goal / Question</label>
            <textarea id="goal" name="goal" rows="3" placeholder="What do you want to explore? e.g., What if Ferrari suffers two more DNFs?"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Create Scenario</button>
    </form>
</div>
{% endblock %}
